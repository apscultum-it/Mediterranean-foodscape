<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mediterranean Foodscape — Save the Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,500;1,9..144,600&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f3ead6; --paper-2:#ece0c5; --card:#fbf5e6;
    --ink:#2b2117; --ink-soft:#5c4f3d;
    --teal:#0f5560; --teal-2:#1c7686;
    --terra:#b5462e; --olive:#6c7330; --gold:#cc8a1f;
    --green:#4f7a3f; --magenta:#b81e63; --brown:#8a5a2b; --blue:#235b8c;
    --line:#cbb487; --shadow:rgba(43,33,23,.2);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--paper);color:var(--ink);font-family:'Spectral',Georgia,serif;line-height:1.5;
    background-image:repeating-radial-gradient(circle at 22% 18%,transparent 0 40px,rgba(138,90,43,.04) 40px 41px),repeating-radial-gradient(circle at 80% 70%,transparent 0 54px,rgba(15,85,96,.035) 54px 55px);min-height:100vh;}
  .wrap{max-width:1180px;margin:0 auto;padding:0 18px 70px;}
  @keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @keyframes pop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:none}}
  .up{animation:up .5s both;}

  /* photo + svg fallback */
  .ph{position:relative;overflow:hidden;background:radial-gradient(circle at 50% 42%,#fff 0%,var(--paper-2) 100%);}
  .ph svg{position:absolute;inset:0;width:100%;height:100%;filter:drop-shadow(2px 3px 2px rgba(43,33,23,.14));}
  .ph img.photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .45s;}
  .ph img.photo.ok{opacity:1;animation:pop .4s both;}

  /* HERO */
  .hero{position:relative;margin:0 -18px 22px;overflow:hidden;border-bottom:4px double var(--ink);height:clamp(190px,34vw,330px);}
  .hero .ph{position:absolute;inset:0;}
  .hero .shade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(15,85,96,.15) 0%,rgba(43,33,23,.62) 100%);}
  .hero-text{position:absolute;left:0;right:0;bottom:0;text-align:center;padding:0 16px 18px;}
  .kicker{font-family:'Fraunces',serif;font-weight:600;font-size:.7rem;letter-spacing:.4em;text-transform:uppercase;color:#fbf5e6;margin:0 0 2px;text-shadow:0 1px 4px rgba(0,0,0,.6);}
  h1.title{font-family:'Fraunces',serif;font-weight:900;font-size:clamp(2.1rem,7vw,4.4rem);line-height:.9;margin:0;color:#fbf5e6;text-shadow:0 2px 14px rgba(0,0,0,.6);letter-spacing:-.01em;}
  h1.title em{font-style:italic;font-weight:500;color:#ffd98a;}
  .subtitle{font-style:italic;color:#f6efde;margin:6px 0 0;font-size:clamp(.85rem,2.4vw,1.05rem);text-shadow:0 1px 6px rgba(0,0,0,.7);}

  /* career ribbon */
  .career{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;background:var(--ink);color:#f3ead6;font-family:'Fraunces',serif;font-size:.82rem;padding:7px 16px;margin:0 -18px 22px;letter-spacing:.04em;}
  .career b{color:#ffd98a;}

  button{font-family:'Fraunces',serif;cursor:pointer;border:none;}
  .btn{background:var(--magenta);color:#fff;font-weight:600;font-size:1rem;padding:13px 30px;border-radius:2px;box-shadow:3px 3px 0 var(--ink);transition:transform .12s,box-shadow .12s;}
  .btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink);}
  .btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink);}
  .btn:disabled{background:var(--paper-2);color:#a8957a;box-shadow:none;cursor:not-allowed;border:1px solid var(--line);}
  .btn.ghost{background:transparent;color:var(--ink);box-shadow:none;text-decoration:underline;padding:9px 12px;font-size:.92rem;}
  .btn.sm{padding:9px 18px;font-size:.9rem;}

  .intro-card{background:var(--card);border:1px solid var(--line);padding:26px 30px;max-width:820px;margin:0 auto;box-shadow:7px 7px 0 var(--shadow);}
  .intro-card p{font-size:1.05rem;}
  .horizons{display:flex;gap:14px;margin:20px 0;flex-wrap:wrap;}
  .horizon{flex:1;min-width:150px;border-left:3px solid var(--teal);padding:4px 0 4px 12px;}
  .horizon b{font-family:'Fraunces',serif;display:block;color:var(--teal);}
  .horizon span{font-size:.9rem;color:var(--ink-soft);}
  .dimgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin:14px 0 4px;}
  .dimtag{display:flex;align-items:center;gap:7px;font-size:.86rem;font-family:'Fraunces',serif;}
  .dot{width:12px;height:12px;border-radius:3px;flex:0 0 12px;}
  .center{text-align:center;} .hl{color:var(--magenta);}

  .sec-head{font-family:'Fraunces',serif;font-weight:900;font-size:1.7rem;margin:0 0 2px;}
  .sec-sub{color:var(--ink-soft);font-style:italic;margin:0 0 18px;}

  /* scenario cards */
  .brief-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;}
  .brief{background:var(--card);border:1px solid var(--line);cursor:pointer;transition:transform .14s,box-shadow .14s;overflow:hidden;box-shadow:5px 5px 0 var(--shadow);display:flex;flex-direction:column;}
  .brief:hover{transform:translateY(-4px);box-shadow:7px 9px 0 var(--shadow);}
  .brief .ph{height:150px;}
  .brief .body{padding:15px 18px 18px;display:flex;flex-direction:column;flex:1;}
  .brief .src{font-family:'Fraunces',serif;font-size:.6rem;letter-spacing:.24em;text-transform:uppercase;color:#fff;background:var(--ink);display:inline-block;padding:3px 8px;align-self:flex-start;}
  .brief h3{font-family:'Fraunces',serif;font-size:1.4rem;margin:10px 0 3px;line-height:1.03;}
  .brief .place{font-style:italic;color:var(--teal);margin:0 0 9px;font-size:.92rem;}
  .brief p{font-size:.92rem;margin:0 0 13px;color:var(--ink-soft);flex:1;}
  .brief .meta{font-size:.78rem;display:flex;justify-content:space-between;border-top:1px dotted var(--line);padding-top:9px;font-family:'Fraunces',serif;}

  .build-top{display:flex;justify-content:space-between;align-items:flex-end;gap:14px;flex-wrap:wrap;margin:16px 0 6px;}
  .briefing{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--terra);padding:14px 18px;margin-bottom:16px;font-size:.95rem;}
  .briefing b{font-family:'Fraunces',serif;}
  .rules{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  .rule{font-family:'Fraunces',serif;font-size:.74rem;background:var(--paper-2);border:1px solid var(--line);padding:4px 10px;border-radius:14px;}
  .vlabel{font-family:'Fraunces',serif;font-weight:600;font-size:.95rem;}
  .vision-pick{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 22px;}
  .vchip{border:1px solid var(--line);background:var(--card);padding:8px 14px;border-radius:20px;font-family:'Fraunces',serif;font-size:.84rem;cursor:pointer;transition:.12s;}
  .vchip:hover{border-color:var(--teal);}
  .vchip.on{background:var(--teal);color:#fff;border-color:var(--teal);box-shadow:2px 2px 0 var(--ink);}

  .layout{display:grid;grid-template-columns:1fr 318px;gap:26px;align-items:start;}
  @media(max-width:920px){.layout{grid-template-columns:1fr;}}
  .course{margin-bottom:22px;}
  .course-label{font-family:'Fraunces',serif;font-weight:600;text-transform:uppercase;letter-spacing:.18em;font-size:.78rem;color:var(--terra);border-bottom:1px solid var(--line);padding-bottom:4px;margin-bottom:12px;}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(172px,1fr));gap:13px;}
  .dish{background:var(--card);border:1px solid var(--line);padding:0 0 12px;cursor:pointer;transition:.12s;position:relative;display:flex;flex-direction:column;overflow:hidden;}
  .dish:hover{border-color:var(--ink);transform:translateY(-3px);box-shadow:4px 4px 0 var(--shadow);}
  .dish.sel{border:2px solid var(--magenta);box-shadow:4px 4px 0 var(--magenta);}
  .dish .ph{height:132px;border-bottom:1px solid var(--line);}
  .tags{position:absolute;top:8px;left:8px;display:flex;gap:4px;z-index:2;}
  .tag{font-family:'Fraunces',serif;font-size:.6rem;font-weight:600;padding:2px 7px;border-radius:10px;color:#fff;letter-spacing:.04em;box-shadow:1px 1px 0 rgba(0,0,0,.2);}
  .t-veg{background:var(--green);} .t-kids{background:var(--gold);} .t-soft{background:var(--blue);} .t-adult{background:#7a3b6a;}
  .dish .pad{padding:0 12px;}
  .dish .dn{font-family:'Fraunces',serif;font-weight:600;font-size:.96rem;margin:9px 0 2px;line-height:1.07;}
  .dish .story{font-size:.76rem;color:var(--ink-soft);font-style:italic;margin:0 0 8px;flex:1;}
  .dish .cost{font-family:'Fraunces',serif;font-weight:600;color:var(--teal);font-size:1.02rem;}
  .pips{display:flex;gap:3px;margin-top:8px;}
  .pip{flex:1;height:8px;border-radius:1px;background:var(--paper-2);position:relative;overflow:hidden;}
  .pip i{position:absolute;left:0;bottom:0;width:100%;}
  .sel-flag{position:absolute;top:8px;right:8px;background:var(--magenta);color:#fff;font-family:'Fraunces',serif;font-size:.62rem;font-weight:600;padding:3px 8px;border-radius:10px;box-shadow:1px 1px 0 var(--ink);z-index:3;}

  .board{background:var(--card);border:1px solid var(--line);padding:18px;position:sticky;top:14px;box-shadow:5px 5px 0 var(--shadow);}
  .board h4{font-family:'Fraunces',serif;margin:0 0 2px;font-size:1.15rem;}
  .board .hint{font-size:.78rem;color:var(--ink-soft);margin:0 0 14px;font-style:italic;}
  .budget{margin-bottom:16px;}
  .budget-row{display:flex;justify-content:space-between;font-family:'Fraunces',serif;font-size:.85rem;margin-bottom:4px;}
  .budbar{height:13px;background:var(--paper);border:1px solid var(--line);position:relative;overflow:hidden;}
  .budbar i{display:block;height:100%;background:var(--green);transition:width .25s,background .25s;}
  .budbar.over i{background:var(--terra);}
  .meter{margin-bottom:9px;}
  .meter-row{display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:2px;}
  .meter-row b{font-family:'Fraunces',serif;font-weight:600;}
  .bar{height:9px;background:var(--paper);border:1px solid var(--line);overflow:hidden;}
  .bar i{display:block;height:100%;transition:width .3s;}
  .total{text-align:center;border-top:2px solid var(--ink);margin-top:14px;padding-top:12px;}
  .total .num{font-family:'Fraunces',serif;font-weight:900;font-size:2.8rem;line-height:1;}
  .total .lbl{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-soft);}

  .result{max-width:840px;margin:0 auto;}
  .verdict{text-align:center;background:var(--card);border:1px solid var(--line);box-shadow:7px 7px 0 var(--shadow);overflow:hidden;}
  .verdict .ph{height:140px;}
  .verdict .ph .shade{position:absolute;inset:0;}
  .verdict .pad{padding:0 24px 24px;}
  .verdict .big{font-family:'Fraunces',serif;font-weight:900;font-size:4.2rem;line-height:1;color:var(--magenta);margin-top:14px;}
  .verdict .of{color:var(--ink-soft);font-size:1.1rem;}
  .verdict .rank{font-family:'Fraunces',serif;font-weight:900;font-size:clamp(1.6rem,5vw,2.5rem);line-height:1;margin:4px 0;}
  .verdict .breakdown{font-size:.85rem;color:var(--ink-soft);margin-top:6px;}
  .events{margin:18px 0;}
  .event{display:flex;gap:12px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-left:5px solid var(--teal);padding:13px 16px;margin-bottom:10px;animation:up .5s both;}
  .event.bad{border-left-color:var(--terra);}
  .event .ico{font-family:'Fraunces',serif;font-weight:900;font-size:1.1rem;width:34px;height:34px;flex:0 0 34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;background:var(--teal);}
  .event.bad .ico{background:var(--terra);}
  .event h6{font-family:'Fraunces',serif;margin:0 0 3px;font-size:1rem;}
  .event p{margin:0;font-size:.88rem;}
  .event .delta{font-family:'Fraunces',serif;font-weight:700;margin-left:auto;white-space:nowrap;}
  .res-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0;}
  @media(max-width:560px){.res-grid{grid-template-columns:1fr;}}
  .res-block{background:var(--card);border:1px solid var(--line);padding:14px 16px;border-left:4px solid var(--teal);}
  .res-block.weak{border-left-color:var(--terra);}
  .res-block .pl{font-family:'Fraunces',serif;font-size:.66rem;letter-spacing:.2em;text-transform:uppercase;color:var(--terra);}
  .res-block h5{font-family:'Fraunces',serif;font-size:1.12rem;margin:3px 0 6px;}
  .res-block p{margin:0;font-size:.9rem;}
  .menu-recap{background:var(--card);border:1px dashed var(--line);padding:8px 14px;margin:18px 0;}
  .menu-recap div{display:flex;align-items:center;gap:12px;padding:7px 0;border-bottom:1px dotted var(--line);}
  .menu-recap div:last-child{border:none;}
  .menu-recap .mini{width:46px;height:40px;flex:0 0 46px;border-radius:4px;overflow:hidden;}
  .menu-recap .c{font-family:'Fraunces',serif;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);width:74px;flex:0 0 74px;}
  .menu-recap .nm{flex:1;font-weight:500;font-size:.92rem;}
  .menu-recap .pr{font-family:'Fraunces',serif;color:var(--teal);}
  footer.fine{text-align:center;margin-top:34px;font-size:.76rem;color:var(--ink-soft);border-top:1px solid var(--line);padding-top:16px;}
  footer.fine b{color:var(--terra);}
  .credits{margin:12px auto 0;max-width:620px;text-align:left;}
  .credits summary{cursor:pointer;font-family:'Fraunces',serif;color:var(--teal);}
  .credits p,.credits li{font-size:.74rem;line-height:1.5;}
  .credits code{background:var(--paper-2);padding:1px 5px;border-radius:3px;}
  .credits ul{margin:8px 0 0;padding-left:18px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero" id="hero"></div>
  <div id="career"></div>
  <div id="app"></div>
  <footer class="fine">
    Built on the <b>Food Realities Foresight</b> method · 6 scenarios from <b>Our Food Our Future</b>, <b>AdriEATic</b> &amp; <b>GourmetPast</b> · a foresight bridge between <b>Cultum</b> and <b>Caso Geographics</b>.
    <details class="credits"><summary>Image credits &amp; licensing</summary><div id="creditbox"></div></details>
  </footer>
</div>

<script>
/* ============ PHOTO + FALLBACK ============ */
const IMG_DIR='images/';
const IMG={
  a1:'anchovies',a2:'burrata',a3:'smoked-salmon',a4:'quinoa-avocado',a5:'panzerotti',
  p1:'orecchiette',p2:'fava-chicory',p3:'asparagus-risotto',p4:'lobster-linguine',p5:'tomato-spaghetti',
  s1:'mackerel',s2:'mussel-chickpea',s3:'tuna-steak',s4:'lamb',s5:'beef-burger',s6:'vegetable-tian',
  c1:'wild-greens',c2:'grilled-vegetables',c3:'fries',c4:'stuffed-tomatoes',c5:'greenhouse-salad',
  d1:'fruit-vincotto',d2:'fig-cake',d3:'strawberries-cream',d4:'mango-cheesecake',d5:'pasticciotto',
  b1:'primitivo-wine',b2:'water-lemon',b3:'cola',b4:'almond-milk',b5:'orange-juice',
  blue:'blue-table',canteen:'canteen',feast:'feast',agri:'agriturismo',hospital:'care-kitchen',festival:'sagra',hero:'hero'
};
function imgSrc(key){ return IMG_DIR+(IMG[key]||key)+'.jpg'; }
/* If you replace any illustration with a Creative-Commons photo, add its TASL credit here:
   'anchovies.jpg':{title:'Salted anchovies',author:'A. Author',source:'Flickr',license:'CC BY 2.0',url:'https://...'} */
const IMG_CREDITS={};
function renderCredits(){
  const box=document.getElementById('creditbox');if(!box)return;
  const keys=Object.keys(IMG_CREDITS);
  if(!keys.length){box.innerHTML='<p>All artwork in this build is original illustration, free to reuse. When you replace an image in <code>images/</code> with a Creative-Commons photo, list it here in TASL form — Title · Author · Source · Licence — as CC attribution requires.</p>';return;}
  box.innerHTML='<ul>'+keys.map(k=>{const c=IMG_CREDITS[k];return `<li><code>${k}</code> — ${c.title} · ${c.author} · <a href="${c.url}" target="_blank" rel="noopener">${c.source}</a> · ${c.license}</li>`;}).join('')+'</ul>';
}
function photoBlock(key,svg,cls){
  return `<div class="ph ${cls||''}">${svg||''}<img class="photo" loading="lazy" src="${imgSrc(key)}" onload="this.classList.add('ok')" onerror="this.remove()"></div>`;
}
/* ============ SCENE + HERO SVG (always-visible, zero network) ============ */
const HERO_SVG=`<svg viewBox="0 0 900 300" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f2d98a"/><stop offset="1" stop-color="#e8a85f"/></linearGradient><linearGradient id="seaG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2c8190"/><stop offset="1" stop-color="#0f5560"/></linearGradient></defs><rect width="900" height="300" fill="url(#sky)"/><circle cx="700" cy="95" r="48" fill="#fbe6a3"/><path d="M0 150 Q150 110 320 145 T620 135 T900 150 V200 H0 Z" fill="#9a7b46" opacity=".55"/><path d="M0 165 Q200 135 430 165 T900 160 V210 H0 Z" fill="#6c7330" opacity=".75"/><rect y="178" width="900" height="122" fill="url(#seaG)"/><g stroke="#bfe2e3" stroke-width="2" opacity=".5" fill="none"><path d="M40 205 q14 -6 28 0 t28 0"/><path d="M380 210 q14 -6 28 0 t28 0"/><path d="M720 212 q14 -6 28 0 t28 0"/><path d="M120 250 q14 -6 28 0 t28 0"/></g><g transform="translate(250 168)"><path d="M-26 28 L26 28 L18 40 L-18 40 Z" fill="#2b2117"/><rect x="-1" y="-30" width="2.5" height="58" fill="#2b2117"/><path d="M2 -28 L26 24 L2 24 Z" fill="#fbf5e6"/><path d="M-2 -16 L-22 24 L-2 24 Z" fill="#e9d7a8"/></g></svg>`;
const SCENE={
  blue:`<svg viewBox="0 0 300 120" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg"><rect width="300" height="120" fill="#ead6a4"/><circle cx="240" cy="34" r="22" fill="#fbe09a"/><path d="M0 60 Q80 44 170 58 T300 56 V72 H0Z" fill="#b5462e" opacity=".6"/><rect y="66" width="300" height="54" fill="#2c8190"/><g stroke="#bfe2e3" stroke-width="2" fill="none" opacity=".55"><path d="M30 86 q12 -5 24 0 t24 0"/><path d="M240 84 q12 -5 24 0 t24 0"/></g><g transform="translate(90 58)"><path d="M-20 22 H20 L14 32 H-14Z" fill="#2b2117"/><rect x="-1" y="-22" width="2" height="44" fill="#2b2117"/><path d="M2 -20 L20 18 L2 18Z" fill="#fbf5e6"/></g></svg>`,

function allowed(course){const f=(BRIEFS[state.brief].rules.forbid)||[];return DECK[course].filter(d=>!(d.tags||[]).some(t=>f.includes(t)));}
function chosenDishes(){return COURSES.filter(c=>state.picks[c]).map(c=>DECK[c].find(d=>d.id===state.picks[c]));}

/* ============ SCORING ============ */
function computeScores(){
  const b=BRIEFS[state.brief];const dishes=chosenDishes();const n=dishes.length||1;const scores={};
  ['season','local','lowwaste','nutrition','heritage','story'].forEach(k=>{scores[k]=Math.round((dishes.reduce((a,d)=>a+(d[k]||0),0)/n)/5*100);});
  const seaD=dishes.filter(d=>d.sea!==null&&d.sea!==undefined);
  scores.sea=seaD.length?Math.round(seaD.reduce((a,d)=>a+d.sea,0)/seaD.length/5*100):100;
  const totalCost=dishes.reduce((a,d)=>a+d.cost,0);
  scores.afford=Math.max(0,Math.min(100,Math.round(130-totalCost*2.3)));
  const w={...b.weights};if(state.vision){const bo=VISIONS[state.vision].boost;for(const k in bo)w[k]=(w[k]||1)*bo[k];}
  let ws=0,t=0;DIMS.forEach(d=>{const wt=w[d.k]||1;ws+=wt;t+=scores[d.k]*wt;});
  return {scores,overall:Math.round(t/ws),totalCost,dishes};
}
function menuFlags(){const ds=chosenDishes();return{hasVeg:ds.some(d=>d.id[0]==='s'&&(d.tags||[]).includes('veg')),hasKids:ds.some(d=>!d.drink&&(d.tags||[]).includes('kids')),hasSea:ds.some(d=>d.sea!==null&&d.sea!==undefined)};}
function pips(d){return `<div class="pips">${DIMS.map(dim=>{let v=dim.k==='afford'?Math.max(0,Math.min(5,Math.round((130-d.cost*2.3)/22))):(d[dim.k]==null?0:d[dim.k]);const h=v/5*100;return `<div class="pip" title="${dim.l}"><i style="height:${h}%;background:${dim.c};opacity:${0.4+h/200}"></i></div>`;}).join('')}</div>`;}

function renderBuild(){
  const b=BRIEFS[state.brief];
  const rulesTags=[];
  if(b.rules.forbid&&b.rules.forbid.includes('adult')) rulesTags.push('No alcohol');

  if(b.rules.minSoft) rulesTags.push('≥'+b.rules.minSoft+' easy-to-eat dishes');
  if(b.rules.minDim){for(const k in b.rules.minDim){rulesTags.push('Min '+DIMS.find(d=>d.k===k).l.toLowerCase()+' '+b.rules.minDim[k]);}}
  rulesTags.push('Budget €'+b.budget);
  const layoutCards=COURSES.map(course=>`<div class="course"><div class="course-label">${course}</div><div class="cards">
    ${allowed(course).map(d=>{const sel=state.picks[course]===d.id;return `<div class="dish ${sel?'sel':''}" onclick="pick('${course}','${d.id}')">
      ${sel?'<span class="sel-flag">on the menu</span>':''}

    <div class="layout"><div>${layoutCards}</div><div class="board" id="board"></div></div>`;

function renderBoard(){
  const b=BRIEFS[state.brief];const{scores,overall,totalCost}=computeScores();
  const courses=COURSES.length;const filled=COURSES.filter(c=>state.picks[c]).length;const over=totalCost>b.budget;
  // unmet rule check
  let unmet=[];const ds=chosenDishes();
  if(b.rules.need&&filled===courses){
    const nd=b.rules.need; let sat;
    if(nd.course){const cd=DECK[nd.course].find(x=>x.id===state.picks[nd.course]);sat=cd&&!cd.drink&&(cd.tags||[]).includes(nd.tag);}
    else {sat=ds.some(d=>!d.drink&&(d.tags||[]).includes(nd.tag));}
    if(!sat) unmet.push('needs '+nd.label);
  }
  if(b.rules.minSoft&&filled===courses){
    const softCount=ds.filter(d=>!d.drink&&(d.tags||[]).includes('soft')).length;
    if(softCount<b.rules.minSoft) unmet.push('needs '+b.rules.minSoft+' easy-to-eat dishes');
  }
  if(b.rules.minDim){for(const k in b.rules.minDim){if(filled===courses&&scores[k]<b.rules.minDim[k]) unmet.push(DIMS.find(d=>d.k===k).l.toLowerCase()+' too low');}}
  const ready=filled===courses&&!over&&unmet.length===0;
  const board=document.getElementById('board');if(!board)return;
  board.innerHTML=`<h4>Live foodscape</h4>
    <p class="hint">${filled}/${courses} courses${over?' · <span style="color:var(--terra)">over budget</span>':''}${unmet.length?' · <span style="color:var(--terra)">'+unmet[0]+'</span>':''}</p>
    <div class="budget"><div class="budget-row"><span>Budget</span><span style="color:${over?'var(--terra)':'var(--ink)'}">€${totalCost} / €${b.budget}</span></div>
    <div class="budbar ${over?'over':''}"><i style="width:${Math.min(100,totalCost/b.budget*100)}%"></i></div></div>
    ${DIMS.map(d=>`<div class="meter"><div class="meter-row"><b>${d.l}</b><span>${scores[d.k]}</span></div><div class="bar"><i style="width:${scores[d.k]}%;background:${d.c}"></i></div></div>`).join('')}
    <div class="total"><div class="num">${filled?overall:'—'}</div><div class="lbl">Foodscape score</div></div>
    <div class="center" style="margin-top:14px;"><button class="btn sm" ${ready?'':'disabled'} onclick="serve()">${over?'Trim the budget':unmet.length?'Meet the rules':filled<courses?'Fill every course':'Open for service →'}</button></div>`;
}
function serve(){
  const{scores,overall}=computeScores();const flags=menuFlags();
  const s={...scores,hasVeg:flags.hasVeg,hasKids:flags.hasKids,hasSea:flags.hasSea};
  // pick up to 2 applicable events
  const pool=EVENTS.filter(e=>e.sc.includes(state.brief));
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  const chosen=pool.slice(0,2);
  let delta=0;state.events=chosen.map(e=>{const ok=e.cond(s);const[txt,d]=ok?e.hit:e.miss;delta+=d;return{title:e.title,txt,d,good:ok};});
  // scenario rule bonus for meeting 'need' nicely already enforced; small bonus for vision alignment handled in weights
  state.final=Math.max(0,Math.min(100,overall+delta));
  career.rounds++;career.sum+=state.final;career.best=Math.max(career.best,state.final);
  go('result');
}
function renderResult(){
  const b=BRIEFS[state.brief];const{scores,overall}=computeScores();const final=state.final;
  let rank,blurb;
  if(final>=82){rank='Foodscape Steward';blurb='A menu the next generation could inherit with gratitude.';}
  else if(final>=66){rank='Territory Builder';blurb='A confident step toward your 2040 — with room to push further.';}
  else if(final>=50){rank='Apprentice Forager';blurb='The instinct is there; the trade-offs got the better of you.';}
  else {rank='Back to the Drawing Board';blurb='This menu pulls the territory the wrong way. Re-think and re-cook.';}
  const ranked=DIMS.map(d=>({...d,v:scores[d.k]})).sort((a,c)=>a.v-c.v);
  const weak=ranked[0],strong=ranked[ranked.length-1];const wp=PRINCIPLES[weak.k],sp=PRINCIPLES[strong.k];
  const recap=COURSES.map(c=>{const d=DECK[c].find(x=>x.id===state.picks[c]);return `<div><div class="mini">${photoBlock(d.id,dishArt(d))}</div><span class="c">${c}</span><span class="nm">${d.n}</span><span class="pr">${d.cost===0?'free':'€'+d.cost}</span></div>`;}).join('');
  const eventsHtml=state.events.map(e=>`<div class="event ${e.good?'':'bad'}"><div class="ico">${e.good?'✓':'!'}</div><div><h6>${e.title}</h6><p>${e.txt}</p></div><span class="delta" style="color:${e.good?'var(--green)':'var(--terra)'}">${e.d>0?'+':''}${e.d}</span></div>`).join('');
  app.innerHTML=`<div class="result up">
    <div class="verdict"><div class="ph" style="height:140px">${SCENE[state.brief]}<img class="photo" loading="lazy" src="${imgSrc(state.brief)}" onload="this.classList.add('ok')" onerror="this.remove()"><div class="shade" style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(15,85,96,.1),rgba(43,33,23,.5))"></div></div>
      <div class="pad">
        <p class="kicker" style="color:var(--terra);text-shadow:none;margin-top:14px">${b.n} · steering toward ${VISIONS[state.vision].n}</p>
        <div class="big">${final}<span class="of"> / 100</span></div>
        <div class="rank">${rank}</div>
        <p style="font-style:italic;max-width:480px;margin:8px auto 0;color:var(--ink-soft)">${blurb}</p>
        <p class="breakdown">Menu design ${overall} ${final-overall>=0?'+':'−'} ${Math.abs(final-overall)} from how service went</p>
      </div></div>
    <h3 style="font-family:'Fraunces',serif;margin:24px 0 6px">Service report</h3>
    <div class="events">${eventsHtml}</div>
    <div class="res-grid">
      <div class="res-block"><div class="pl">Your strength · ${sp.p}</div><h5>${strong.l} — ${strong.v}/100</h5><p>${sp.t}</p></div>
      <div class="res-block weak"><div class="pl">Work on this · ${wp.p}</div><h5>${weak.l} — ${weak.v}/100</h5><p>${wp.t}</p></div>
    </div>
    <h3 style="font-family:'Fraunces',serif;margin:18px 0 4px">Tonight's menu</h3>
    <div class="menu-recap">${recap}</div>
    <div class="center" style="margin-top:14px;"><button class="btn" onclick="replaySame()">Re-cook this service</button> <button class="btn ghost" onclick="replayNew()">Try another setting →</button></div>
  </div>`;
}

/* ============ ACTIONS ============ */
function go(s){state.screen=s;render();renderCareer();window.scrollTo({top:0,behavior:'smooth'});}
function pickBrief(k){state.brief=k;state.vision=BRIEFS[k].vision;state.picks={};state.events=[];go('build');}
function setVision(k){state.vision=k;renderBuild();}
function pick(c,id){state.picks[c]=(state.picks[c]===id)?undefined:id;if(state.picks[c]===undefined)delete state.picks[c];renderBuild();}
function replaySame(){state.picks={};state.events=[];go('build');}
function replayNew(){state.brief=null;state.vision=null;state.picks={};state.events=[];go('brief');}
function render(){({intro:renderIntro,brief:renderBriefSelect,build:renderBuild,result:renderResult}[state.screen])();}

document.getElementById('hero').innerHTML=photoBlock('hero',HERO_SVG)+
  `<div class="shade"></div><div class="hero-text"><p class="kicker">A Serious Game on Sustainable Food Systems</p><h1 class="title">Mediterranean <em>Foodscape</em></h1><p class="subtitle">Six services. One question: can the menu steer your territory toward the food system of 2040?</p></div>`;
render();renderCareer();renderCredits();
